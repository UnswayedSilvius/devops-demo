name: Devops Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -t devops-demo

    - name: Run Container Test
      run: docker run -d -p 5000:5000 devops-demo

  
